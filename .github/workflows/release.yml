name: release

# Dispatch-only release. scripts/do-release.sh pushes the exact tag after
# local ci-slow passes, then triggers this workflow with the tag input below.
# The pre-release CI gate runs the regular make-ci ingredients in parallel.
# After publishing the GitHub Release, this workflow calls regen.yml so the
# Pages registry is rebuilt with the released tooling.
on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release, for example v1.2.3"
        required: true

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  static-check:
    name: pre-release static checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.tag }}
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: make setup

      - name: Run static checks
        run: make static-check

  test:
    name: pre-release tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.tag }}
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: make setup

      - name: Run tests
        run: make test

  publish-github-release:
    name: publish GitHub Release
    needs: [static-check, test]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.event.inputs.tag }}
        run: |
          gh release create "$TAG_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --title "$TAG_NAME" \
            --generate-notes \
            --verify-tag

  refresh-index:
    name: refresh Pages index
    needs: [publish-github-release]
    uses: ./.github/workflows/regen.yml
    permissions:
      contents: read
      pages: write
      id-token: write
    secrets: inherit
