name: Publish package to pdomain-index-npm

on:
  workflow_dispatch:
    inputs:
      tarball_url:
        description: "URL to the .tgz to publish (typically a GitHub Release asset URL)"
        required: true
        type: string
  repository_dispatch:
    types: [pd-npm-publish]

concurrency:
  # Serialize all publishes; the gh-pages branch is mutated.
  group: pdomain-index-npm-publish
  cancel-in-progress: false

permissions:
  contents: write # to push to gh-pages

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  publish:
    runs-on: ubuntu-latest
    outputs:
      package: ${{ steps.publish.outputs.package }}
      version: ${{ steps.publish.outputs.version }}
    steps:
      - name: Checkout main (tooling)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: main
          path: tooling
          persist-credentials: false
      - name: Checkout gh-pages (registry content)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: gh-pages
          path: registry
          persist-credentials: false
      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "24"
      - name: Build tooling
        working-directory: tooling
        run: |
          make setup
          make ci
      - name: Resolve tarball URL
        id: url
        env:
          EVENT_NAME: ${{ github.event_name }}
          DISPATCH_TARBALL_URL: ${{ github.event.client_payload.tarball_url }}
          INPUT_TARBALL_URL: ${{ inputs.tarball_url }}
        run: |
          if [ "$EVENT_NAME" = "repository_dispatch" ]; then
            tarball_url="$DISPATCH_TARBALL_URL"
          else
            tarball_url="$INPUT_TARBALL_URL"
          fi
          TARBALL_URL="$tarball_url" node <<'NODE'
          const value = process.env.TARBALL_URL ?? "";
          let parsed;
          try {
            parsed = new URL(value);
          } catch {
            console.error("tarball_url must be a valid URL");
            process.exit(1);
          }
          if (parsed.protocol !== "https:") {
            console.error("tarball_url must use https:");
            process.exit(1);
          }
          if (
            parsed.hostname !== "github.com" ||
            !parsed.pathname.startsWith("/pdomain/pdomain-ui/releases/download/")
          ) {
            console.error(
              "tarball_url must be a pdomain/pdomain-ui GitHub Release asset",
            );
            process.exit(1);
          }
          if (!parsed.pathname.endsWith(".tgz")) {
            console.error("tarball_url path must end with .tgz");
            process.exit(1);
          }
          if (/[\r\n]/.test(value)) {
            console.error("tarball_url must not contain newlines");
            process.exit(1);
          }
          NODE
          printf 'url=%s\n' "$tarball_url" >> "$GITHUB_OUTPUT"
      - name: Publish
        id: publish
        working-directory: tooling
        env:
          TARBALL_URL: ${{ steps.url.outputs.url }}
          REGISTRY_ROOT: ${{ github.workspace }}/registry
          BASE_URL: https://pdomain.github.io/pdomain-index-npm/
          EXPECTED_PACKAGE_NAME: "@pdomain/pdomain-ui"
        run: |
          publish_output=$(make publish-pkg \
            TARBALL_URL="$TARBALL_URL" \
            ROOT="$REGISTRY_ROOT" \
            BASE_URL="$BASE_URL" \
            EXPECTED_PACKAGE_NAME="$EXPECTED_PACKAGE_NAME")
          printf '%s\n' "$publish_output"
          published=$(printf '%s\n' "$publish_output" | sed -n 's/^Published //p' | tail -n 1)
          package="${published%@*}"
          version="${published##*@}"
          if [ -z "$package" ] || [ -z "$version" ]; then
            echo "Could not parse published package/version" >&2
            exit 1
          fi
          case "$package$version" in
            ""|*$'\n'*|*$'\r'*) echo "Could not parse published package/version" >&2; exit 1 ;;
          esac
          printf 'package=%s\n' "$package" >> "$GITHUB_OUTPUT"
          printf 'version=%s\n' "$version" >> "$GITHUB_OUTPUT"
      - name: Commit gh-pages
        id: commit
        working-directory: registry
        env:
          PUBLISHED_PACKAGE: ${{ steps.publish.outputs.package }}
          PUBLISHED_VERSION: ${{ steps.publish.outputs.version }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to commit; tarball was already present."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git commit -m "publish: ${PUBLISHED_PACKAGE}@${PUBLISHED_VERSION}"
          echo "changed=true" >> "$GITHUB_OUTPUT"
      - name: Push gh-pages
        if: steps.commit.outputs.changed == 'true'
        working-directory: registry
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          askpass=$(mktemp)
          trap 'rm -f "$askpass"' EXIT
          cat > "$askpass" <<'EOF'
          #!/bin/sh
          case "$1" in
            *Username*) printf '%s\n' x-access-token ;;
            *) printf '%s\n' "$GITHUB_TOKEN" ;;
          esac
          EOF
          chmod 700 "$askpass"
          GIT_ASKPASS="$askpass" GIT_TERMINAL_PROMPT=0 \
            git push "https://github.com/${GITHUB_REPOSITORY}.git" HEAD:gh-pages

  smoke:
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "24"
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq
      - name: Wait for Pages to update
        # Pages publish lag — usually ~30-60s, occasionally >90s. Poll with backoff.
        env:
          PACKAGE: ${{ needs.publish.outputs.package }}
          VERSION: ${{ needs.publish.outputs.version }}
          REGISTRY: https://pdomain.github.io/pdomain-index-npm/
        run: |
          packument_url="${REGISTRY}${PACKAGE}/"
          for i in 1 2 3 4 5; do
            if curl -fsSL "$packument_url" \
              | jq -e --arg package "$PACKAGE" --arg version "$VERSION" '.name == $package and (.versions[$version] != null)' >/dev/null; then
              echo "Pages live after attempt $i"
              exit 0
            fi
            echo "Attempt $i: packument not yet live; sleeping 30s"
            sleep 30
          done
          echo "Pages did not become available after 5 attempts (150s total)" >&2
          exit 1
      - name: Run smoke test
        env:
          PACKAGE: ${{ needs.publish.outputs.package }}
          VERSION: ${{ needs.publish.outputs.version }}
        run: make smoke
